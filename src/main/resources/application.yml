spring:
  application:
    name: youtube-monetization

  datasource:
    url: jdbc:postgresql://localhost:5432/youtube_monetization
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.flywaydb: info
